    <script>
      
        
        // Mejorar los enlaces de WhatsApp con parámetros automáticos
        document.addEventListener('DOMContentLoaded', function() {
            // Agregar parámetro de referencia QR a todos los enlaces de WhatsApp
            const whatsappLinks = document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp.com"]');
            
            whatsappLinks.forEach(link => {
                // Agregar parámetro de referencia si no existe
                if (!link.href.includes('ref=')) {
                    if (link.href.includes('?')) {
                        link.href += '&ref=QRCodePage';
                    } else {
                        link.href += '?ref=QRCodePage';
                    }
                }
            });
            
            // Efecto de scroll suave para elementos internos
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    if (targetId !== '#') {
                        const targetElement = document.querySelector(targetId);
                        if (targetElement) {
                            targetElement.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    }
                });
            });
            
            // Animación de aparición de tarjetas
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);
            
            // Aplicar animación a las tarjetas
            document.querySelectorAll('.socio-card').forEach(card => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                observer.observe(card);
            });
        });
        
        // Contador para mostrar cuántas personas han visto la oferta
        let viewCount = localStorage.getItem('qrPageViews') || 0;
        viewCount++;
        localStorage.setItem('qrPageViews', viewCount);
        
        // Mostrar contador en consola (opcional, para pruebas)
        console.log(`📊 Esta oferta ha sido vista ${viewCount} veces desde este dispositivo`);
    </script>
